name: Update OpenBMC reference

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1'

jobs:
  update-openbmc:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ secrets.CANOPYBMC_BOT_CLIENT_ID }}
          private-key: ${{ secrets.CANOPYBMC_BOT_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          submodules: recursive
          fetch-depth: 0

      - name: Install go-task
        uses: arduino/setup-task@v3
        with:
          version: 3.x
          repo-token: ${{ steps.app-token.outputs.token }}

      - name: Set up git identity
        run: |
          git config user.name "canopybmc-bot[bot]"
          git config user.email "canopybmc-bot[bot]@users.noreply.github.com"
          git fetch origin
          git branch -D rebase/openbmc 2>/dev/null || true

      - name: Run obmc-bump
        run: task -y obmc-bump

      - name: Create or update PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BODY_FILE=$(mktemp)
          cat > "$BODY_FILE" <<'BODYEOF'
          Automated changes by the update-openbmc GitHub Action.

          ```
          BODYEOF

          git log -1 --pretty=%B origin/rebase/openbmc >> "$BODY_FILE"
          echo '```' >> "$BODY_FILE"

          gh pr create \
            --head rebase/openbmc \
            --title "openbmc: update ref" \
            --body-file "$BODY_FILE" \
          || gh pr edit rebase/openbmc \
            --title "openbmc: update ref" \
            --body-file "$BODY_FILE"
